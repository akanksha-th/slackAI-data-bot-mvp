services:
  redis:
    image: redis:7-alpine
    container_name: slackAIbot_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: slackAIbot_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-slackAI_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-slackAI_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    profiles: ["debug"]
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: slackAIbot_app
    env_file: ../.env
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy  
    volumes:
      - ../src:/app/src

volumes:
  redis_data:
  postgres_data: